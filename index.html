<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear & Chemical Pixel Physics Sim - Ultimate Edition</title>
    <style>
        :root {
            --bg: #87CEEB;
            --panel: rgba(15, 15, 20, 0.95);
            --accent: #ffcc00;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas { display: block; cursor: crosshair; }

        .interface {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            max-height: 85vh;
            background: var(--panel);
            padding: 20px;
            border: 1px solid #444;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 100;
            overflow-y: auto;
        }

        .interface::-webkit-scrollbar { width: 6px; }
        .interface::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        h1 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 5px; }

        .tool-group { margin-bottom: 15px; }
        .label { font-size: 0.75rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        button {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            text-align: center;
        }

        button:hover { background: #333; color: #fff; }
        button.active { background: var(--accent); color: #000; border-color: #fff; font-weight: bold; }

        .status-box {
            margin-top: 15px;
            padding: 10px;
            background: #000;
            font-size: 0.8rem;
            border-left: 3px solid var(--accent);
        }

        #nuke-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #333;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="nuke-overlay"></div>

    <div class="interface">
        <h1>PHYSICS LAB V9.0 (Ultimate)</h1>
        
        <div class="tool-group">
            <div class="label">Structure & Nature</div>
            <div class="grid">
                <button onclick="setTool('CERAMIC', this)" style="color: #a1887f;">도자기</button>
                <button onclick="setTool('DIAMOND', this)" style="color: #b3e5fc;">다이아몬드</button>
                <button onclick="setTool('WOOD', this)" style="color: #8d6e63;">나무</button>
                <button onclick="setTool('COAL', this)" style="color: #555;">석탄</button>
                <button onclick="setTool('WATER', this)" style="color: #2196f3;">물</button>
            </div>
        </div>

        <div class="tool-group">
            <div class="label">Chemicals</div>
            <div class="grid">
                <button onclick="setTool('NG', this)" style="color: #ffeb3b;">나이트로</button>
                <button onclick="setTool('FM', this)" style="color: #ffffff;">뇌홍</button>
                <button onclick="setTool('AA', this)" style="color: #a3ff00;">아지도</button>
                <button onclick="setTool('TNT', this)">TNT</button>
                <button onclick="setTool('C4', this)">C4</button>
                <button onclick="setTool('FIRE', this)" style="color: #ff4400;">불 (Fire)</button>
            </div>
        </div>

        <div class="tool-group">
            <div class="label">Nuclear Materials</div>
            <div class="grid">
                <button onclick="setTool('U235', this)" style="border-bottom: 2px solid #ccff00;">U-235</button>
                <button onclick="setTool('PU239', this)" style="border-bottom: 2px solid #ff00ff;">PU-239</button>
            </div>
        </div>

        <div class="tool-group">
            <div class="label">Utility</div>
            <div class="grid">
                <button onclick="setTool('EMPTY', this)" style="grid-column: span 2; color: #ff5555;">지우개 (바닥 제외)</button>
            </div>
        </div>

        <div class="status-box">
            <div>임계 질량 모니터: <span id="mass-display">0</span> u</div>
            <div id="alert-msg" style="color: #ffcc00;">빈 공간에만 설치 가능 로직 적용.</div>
        </div>

        <button onclick="clearMap()" style="width: 100%; margin-top: 10px; background: #400;">전체 리셋</button>
    </div>

    <div class="instruction">불꽃이나 폭발이 근처에 있으면 나무에 불이 붙습니다.</div>

    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const nukeOverlay = document.getElementById('nuke-overlay');
        const massDisplay = document.getElementById('mass-display');

        const SCALE = 4;
        let width, height, cols, rows;
        let grid;
        let currentTool = 'NG';
        let isMouseDown = false;
        let particles = [];
        const MAX_PARTICLES = 2500;

        const MATERIALS = {
            'EMPTY': 0, 'TNT': 1, 'C4': 2, 'AA': 3, 'U235': 4, 'PU239': 5,
            'FIRE': 6, 'EXPLOSION': 7, 'SMOKE': 8, 'GROUND': 9,
            'FM': 10, 'NG': 11, 'CERAMIC': 12, 'DIAMOND': 13, 'WOOD': 14, 'WATER': 15, 'COAL' : 16
        };

        const PROPS = {
            [MATERIALS.TNT]: { color: '#d32f2f', type: 'solid', sensitivity: 0.4, power: 18, fireChance: 0.8 },
            [MATERIALS.C4]: { color: '#e0e0e0', type: 'solid', sensitivity: 0.15, power: 30, fireChance: 0.5 },
            [MATERIALS.AA]: { color: '#a3ff00', type: 'powder', sensitivity: 0.98, power: 15, fireChance: 0.99 },
            [MATERIALS.FM]: { color: '#ffffff', type: 'powder', sensitivity: 0.92, power: 20, fireChance: 0.95 },
            [MATERIALS.NG]: { color: '#ffeb3b', type: 'liquid', sensitivity: 1.0, power: 45, fireChance: 1.0, viscosity: 2 },
            [MATERIALS.U235]: { color: '#ccff00', type: 'solid', critical: 180, power: 100 },
            [MATERIALS.PU239]: { color: '#ff00ff', type: 'solid', critical: 70, power: 150 },
            [MATERIALS.FIRE]: { color: '#ffcc00', type: 'energy' },
            [MATERIALS.EXPLOSION]: { color: '#ffdd00', type: 'energy' },
            [MATERIALS.SMOKE]: { color: '#444444', type: 'gas' },
            [MATERIALS.GROUND]: { color: '#C2B280', type: 'static', indestructible: true },
            [MATERIALS.CERAMIC]: { color: '#6d4c41', type: 'static' },
            [MATERIALS.DIAMOND]: { color: '#b3e5fc', type: 'static', indestructible: true },
            [MATERIALS.WOOD]: { color: '#8d6e63', type: 'static', flammability: 0.05 },
            [MATERIALS.WATER]: { color: '#2196f3', type: 'liquid', viscosity: 6 },
            [MATERIALS.COAL]: { color: '#222222', type: 'solid', flammability: 0.08 }
        };

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.floor(width / SCALE);
            rows = Math.floor(height / SCALE);
            grid = new Int8Array(cols * rows).fill(0);
            
            const groundStart = rows - Math.floor(rows * 0.1);
            for(let y = groundStart; y < rows; y++) {
                for(let x = 0; x < cols; x++) {
                    grid[getIndex(x, y)] = MATERIALS.GROUND;
                }
            }
        }

        function getIndex(x, y) {
            if (x < 0 || x >= cols || y < 0 || y >= rows) return -1;
            return x + y * cols;
        }

        function setTool(tool, btn) {
            currentTool = tool;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        function clearMap() {
            grid.fill(0);
            particles = [];
            init();
        }

        class Debris {
            constructor(x, y, vx, vy, color, isHighEnergy = false) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.initialColor = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = isHighEnergy ? Math.random() * 12 + 6 : Math.random() * 4 + 2;
                this.isHighEnergy = isHighEnergy;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.25; this.vx *= 0.98;
                this.life -= this.decay;
                this.angle += this.spin;

                const gx = Math.floor(this.x / SCALE);
                const gy = Math.floor(this.y / SCALE);
                const idx = getIndex(gx, gy);
                if (idx !== -1) {
                    const mat = grid[idx];
                    if (mat > 0 && !PROPS[mat].indestructible) {
                        if (this.isHighEnergy || (Math.random() < 0.5 && Math.abs(this.vx) + Math.abs(this.vy) > 8)) {
                            grid[idx] = MATERIALS.EMPTY;
                        }
                    }
                }
            }
            draw() {
                ctx.globalAlpha = this.life;
                if (this.isHighEnergy) {
                    ctx.fillStyle = this.life > 0.6 ? '#fff' : (this.life > 0.3 ? '#ffdd00' : '#ff4400');
                    ctx.shadowBlur = this.life * 15;
                    ctx.shadowColor = '#ffaa00';
                } else {
                    ctx.fillStyle = this.initialColor;
                    ctx.shadowBlur = 0;
                }
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        const handleInput = (e) => {
            if (!isMouseDown) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = Math.floor((e.clientX - rect.left) / SCALE);
            const mouseY = Math.floor((e.clientY - rect.top) / SCALE);
            const radius = 3;

            for (let i = -radius; i <= radius; i++) {
                for (let j = -radius; j <= radius; j++) {
                    if (Math.sqrt(i*i + j*j) <= radius) {
                        const idx = getIndex(mouseX + i, mouseY + j);
                        if (idx !== -1) {
                            const targetMat = grid[idx];
                            if (currentTool === 'EMPTY') {
                                if (targetMat !== MATERIALS.GROUND) grid[idx] = MATERIALS.EMPTY;
                            } else {
                                // 빈 공간(EMPTY)에만 설치 가능
                                if (targetMat === MATERIALS.EMPTY) grid[idx] = MATERIALS[currentTool];
                            }
                        }
                    }
                }
            }
        };

        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('resize', init);

        function triggerNuclear(x, y) {
            nukeOverlay.style.transition = 'none';
            nukeOverlay.style.opacity = '1';
            setTimeout(() => {
                nukeOverlay.style.transition = 'opacity 3.5s ease-out';
                nukeOverlay.style.opacity = '0';
            }, 50);
            for (let i = 0; i < 500; i++) {
                const a = Math.random() * Math.PI * 2;
                const v = Math.random() * 45 + 15;
                particles.push(new Debris(x * SCALE, y * SCALE, Math.cos(a) * v, Math.sin(a) * v, '#fff', true));
            }
            nukeEffect = { x: x * SCALE, y: y * SCALE, size: 0, alpha: 1 };
        }

        let nukeEffect = null;

        function update() {
            let nextGrid = new Int8Array(grid);
            let nuclearCounter = { [MATERIALS.U235]: 0, [MATERIALS.PU239]: 0 };
            let nuclearPos = { [MATERIALS.U235]: {x:0, y:0}, [MATERIALS.PU239]: {x:0, y:0} };

            for (let y = rows - 1; y >= 0; y--) {
                for (let x = 0; x < cols; x++) {
                    const i = getIndex(x, y);
                    const mat = grid[i];
                    if (mat === MATERIALS.EMPTY) continue;
                    const props = PROPS[mat];

                    if (props.type === 'powder' || props.type === 'liquid') {
                        const down = getIndex(x, y + 1);
                        if (down !== -1 && nextGrid[down] === MATERIALS.EMPTY) {
                            nextGrid[i] = MATERIALS.EMPTY; nextGrid[down] = mat;
                        } else {
                            const dir = Math.random() > 0.5 ? 1 : -1;
                            const side = getIndex(x + dir, y + 1);
                            if (side !== -1 && nextGrid[side] === MATERIALS.EMPTY) {
                                nextGrid[i] = MATERIALS.EMPTY; nextGrid[side] = mat;
                            } else if (props.type === 'liquid') {
                                const hSide = getIndex(x + dir, y);
                                if (hSide !== -1 && nextGrid[hSide] === MATERIALS.EMPTY) {
                                    nextGrid[i] = MATERIALS.EMPTY; nextGrid[hSide] = mat;
                                }
                            }
                        }
                    }

                    if (mat === MATERIALS.EXPLOSION) {
                        const radius = 5; 
                        for(let nx = -radius; nx <= radius; nx++) {
                            for(let ny = -radius; ny <= radius; ny++) {
                                const nidx = getIndex(x + nx, y + ny);
                                if (nidx === -1) continue;
                                const t = grid[nidx];
                                if (t > 0 && !PROPS[t].indestructible) {
                                    if (Math.random() < 0.4) nextGrid[nidx] = MATERIALS.EMPTY;
                                    if (t === MATERIALS.WOOD || t === MATERIALS.COAL) nextGrid[nidx] = MATERIALS.FIRE;
                                }
                            }
                        }
                        if (particles.length < MAX_PARTICLES && Math.random() < 0.3) {
                            particles.push(new Debris(x*SCALE, y*SCALE, (Math.random()-0.5)*20, (Math.random()-0.5)*20, '#ffcc00'));
                        }
                        nextGrid[i] = Math.random() < 0.5 ? MATERIALS.SMOKE : MATERIALS.EMPTY;
                    }

                    if (mat === MATERIALS.FIRE) {
                        const upIdx = getIndex(x + (Math.floor(Math.random() * 3) - 1), y - 1);
                        if (upIdx !== -1 && nextGrid[upIdx] === MATERIALS.EMPTY) {
                            nextGrid[i] = MATERIALS.EMPTY; nextGrid[upIdx] = MATERIALS.FIRE;
                        }
                        const neighbors = [getIndex(x+1, y), getIndex(x-1, y), getIndex(x, y+1), getIndex(x, y-1)];
                        for(let nIdx of neighbors) {
                            if(nIdx === -1) continue;
                            const target = grid[nIdx];
                            if(target === MATERIALS.WATER) {
                                nextGrid[i] = MATERIALS.SMOKE; nextGrid[nIdx] = MATERIALS.EMPTY;
                            } else if(PROPS[target]?.flammability && Math.random() < PROPS[target].flammability) {
                                nextGrid[nIdx] = MATERIALS.FIRE;
                            } else if(PROPS[target]?.sensitivity && Math.random() < PROPS[target].fireChance) {
                                nextGrid[nIdx] = MATERIALS.EXPLOSION;
                            }
                        }
                        if (Math.random() < 0.15) nextGrid[i] = MATERIALS.SMOKE;
                    }

                    if (mat === MATERIALS.SMOKE) {
                        const up = getIndex(x + (Math.floor(Math.random() * 3) - 1), y - 1);
                        if (up !== -1 && nextGrid[up] === MATERIALS.EMPTY) {
                            nextGrid[i] = MATERIALS.EMPTY; nextGrid[up] = mat;
                        } else if (Math.random() < 0.03) nextGrid[i] = MATERIALS.EMPTY;
                    }

                    if (mat === MATERIALS.U235 || mat === MATERIALS.PU239) {
                        nuclearCounter[mat]++; nuclearPos[mat].x += x; nuclearPos[mat].y += y;
                    }
                }
            }

            for (let type of [MATERIALS.U235, MATERIALS.PU239]) {
                if (nuclearCounter[type] >= PROPS[type].critical) {
                    triggerNuclear(Math.floor(nuclearPos[type].x / nuclearCounter[type]), Math.floor(nuclearPos[type].y / nuclearCounter[type]));
                    for(let k=0; k<nextGrid.length; k++) {
                        if(nextGrid[k] !== MATERIALS.GROUND && nextGrid[k] !== MATERIALS.DIAMOND) nextGrid[k] = 0;
                    }
                    break;
                }
            }

            massDisplay.innerText = (nuclearCounter[MATERIALS.U235] + nuclearCounter[MATERIALS.PU239]).toString();
            grid = nextGrid;
            for (let j = particles.length - 1; j >= 0; j--) {
                particles[j].update();
                if (particles[j].life <= 0) particles.splice(j, 1);
            }
        }

        function draw() {
            ctx.fillStyle = '#87CEEB'; 
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < grid.length; i++) {
                const mat = grid[i];
                if (mat !== MATERIALS.EMPTY) {
                    const x = (i % cols) * SCALE;
                    const y = Math.floor(i / cols) * SCALE;
                    ctx.fillStyle = PROPS[mat].color;
                    ctx.fillRect(x, y, SCALE, SCALE);
                    if (mat === MATERIALS.FIRE || mat === MATERIALS.EXPLOSION) {
                        ctx.fillStyle = '#fff';
                        if(Math.random() > 0.8) ctx.fillRect(x, y, SCALE, SCALE);
                    }
                }
            }

            for (let p of particles) p.draw();

            if (nukeEffect) {
                ctx.save();
                ctx.globalAlpha = nukeEffect.alpha;
                const grad = ctx.createRadialGradient(nukeEffect.x, nukeEffect.y, 0, nukeEffect.x, nukeEffect.y, nukeEffect.size);
                grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, '#ffaa00'); grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(nukeEffect.x, nukeEffect.y, nukeEffect.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                nukeEffect.size += 30; nukeEffect.alpha -= 0.015;
                if (nukeEffect.alpha <= 0) nukeEffect = null;
            }
        }

        function loop() { 
            update(); draw(); requestAnimationFrame(loop); 
        }
        init(); loop();
    </script>
</body>
</html>
